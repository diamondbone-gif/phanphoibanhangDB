name: Quality

on:
  push:
  pull_request:

jobs:
  laravel:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: htpp_test
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_DEBUG: false
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: htpp_test
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_mysql
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: php artisan migrate --force
      - run: php artisan test
      - run: vendor/bin/pint --test app/Console app/Support app/Services/ReturnAmountCalculator.php app/Services/ReturnOrderService.php tests/Unit
      - run: npm ci
      - run: npm run build
